openapi: 3.0.1
info:
  title: AncientChinese API
  description: >-
    AncientChinese 古汉语智能标注平台后端接口设计（基于 MySQL：users / projects / documents /
    annotations）
  version: 1.0.0
tags:
  - name: Users
  - name: Projects
  - name: Documents
  - name: Annotations
paths:
  /api/users:
    get:
      summary: 获取用户列表
      deprecated: false
      description: ''
      operationId: listUsers
      tags:
        - Users
      parameters:
        - name: page
          in: query
          description: 页码
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 用户列表
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/User'
                          total:
                            type: integer
          headers: {}
        '500':
          $ref: '#/components/responses/InternalError'
          description: 服务器内部错误
      security: []
    post:
      summary: 创建用户
      deprecated: false
      description: ''
      operationId: createUser
      tags:
        - Users
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: 请求参数错误
        '500':
          $ref: '#/components/responses/InternalError'
          description: 服务器内部错误
      security: []
  /api/users/{userId}:
